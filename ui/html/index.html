<!-- --- METAFORGE MAIN UI --- -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaForge Studio</title>

    <!-- LOAD THE MONOLITHIC CSS (Restored from Turn 48) -->
    <link rel="stylesheet" href="/ui/css/metaforge.css?v={{ version_id }}">

    <script src="/ui/js/metaforge_core.js?v={{ version_id }}"></script>
</head>
<body>

<!-- --- DYNAMIC TOOLBAR SECTION --- -->
<header role="banner">
    <nav class="global-nav" aria-label="Global Navigation">
        <!-- BRANDING LOGO: Target for theme-based swap -->
        <img src="/ui/images/logo.svg?v={{ version_id }}" 
             id="mf-main-logo" 
             class="mf-logo" 
             alt="MetaForge Studio">

        {% for tool in tools %}
        <div class="nav-item" 
             id="mode-{{ tool.id }}" 
             role="button" 
             tabindex="0"
             aria-pressed="false" 
             onclick="switchMode('{{ tool.id }}')"
             onkeydown="if(event.key==='Enter' || event.key===' ') { event.preventDefault(); switchMode('{{ tool.id }}'); }"
             title="{{ tool.name }}">
            
            <div class="mf-icon-mask" 
                 style="-webkit-mask-image: url('/tool_asset/{{ tool.id }}/{{ tool.icon }}?v={{ version_id }}'); 
                        mask-image: url('/tool_asset/{{ tool.id }}/{{ tool.icon }}?v={{ version_id }}');
                        background-color: var(--mf-gold);">
            </div>
        </div>
        {% endfor %}
    </nav>
</header>
<!-- --- DYNAMIC TOOLBAR SECTION END --- -->

    <main id="main-stage" role="main" aria-live="polite">
        <div id="mfi-content">
            <p class="tool_notes">Initializing MetaForge Logic Layers...</p>
        </div>
    </main>

    <footer role="contentinfo" style="display: flex; justify-content: flex-end; padding: 0 15px;">
        <span class="data-text" style="font-size: 0.75rem;">
            Your library currently has <span style="color: var(--mf-gold); font-weight: bold;">{{ track_count }}</span> .mp3 files | MetaForge Studio &copy; 2026
        </span>
    </footer>

    <script>
    /**
     * LOCAL BRIDGE
     * Calls the uniquely named Global Engine to prevent recursion loops.
     */
    function switchMode(mode) {
        if (typeof window.mfSwitchMode === 'function') {
            window.mfSwitchMode(mode);
        } else {
            console.error("MetaForge Error: Global Engine not yet registered.");
        }
    }
    </script>
</body>
</html>
<!-- --- METAFORGE MAIN UI END --- -->
